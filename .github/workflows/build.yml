name: Build Chromium (on demand)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          # Sets <nixpkgs> to nixos-25.11 — same branch fetch-nixpkgs uses
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: "-source$"

      - name: Pin nixpkgs rev and sha256 into nixpkgs-pin.json
        run: |
          # Fetch the latest commit for the nixos-25.11 channel
          REV=$(git ls-remote https://github.com/NixOS/nixpkgs refs/heads/nixos-25.11 | awk '{print $1}')
          URL="https://github.com/NixOS/nixpkgs/archive/${REV}.tar.gz"
          SHA256=$(nix-prefetch-url --unpack "$URL" 2>/dev/null)
          python3 -c "
          import json, sys
          pin = {'rev': sys.argv[1], 'sha256': 'sha256:' + sys.argv[2]}
          print(json.dumps(pin, indent=2) + '\n')
          " "$REV" "$SHA256" > nixpkgs-pin.json
          echo "Pinned nixpkgs to $REV (sha256: $SHA256)"

      - name: Build Chromium
        run: nix build .#default -L --cores 0 --max-jobs auto

      - name: Push result to Cachix
        if: github.event_name != 'pull_request'
        run: |
          cachix push ${{ vars.CACHIX_CACHE }} result
          
          REV=$(python3 -c "import json; print(json.load(open('nixpkgs-pin.json'))['rev'])")
          NEW_VERSION=$(curl -s "https://raw.githubusercontent.com/NixOS/nixpkgs/${REV}/pkgs/applications/networking/browsers/chromium/info.json" | python3 -c "import sys, json; print(json.load(sys.stdin)['chromium']['version'])")
          
          echo "$NEW_VERSION" > last-built-version
          
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nixpkgs-pin.json last-built-version
          git diff --cached --quiet || git commit -m "chore: update nixpkgs pin and version to $NEW_VERSION [skip ci]" && git push

